<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <style>
        /* ปรับแต่งสไตล์ให้สวยงามโมเดิร์น */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #2a2a35;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h2 {
            margin-top: 0;
            color: #4dadf7;
            font-size: 24px;
            margin-bottom: 20px;
        }

        button {
            background-color: #4cbd4f;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(76, 189, 79, 0.3);
            margin-bottom: 20px;
        }

        button:hover {
            background-color: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(76, 189, 79, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        #webcam-container {
            margin: 20px auto;
            border: 4px solid #3a3a4a;
            border-radius: 12px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #1e1e24;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #label-container {
            margin-top: 20px;
            text-align: left;
            background: #1e1e24;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #4dadf7;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #3a3a4a;
            font-size: 15px;
        }

        .label-row:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    <button type="button" id="start-btn" onclick="init()">Start Camera</button>
    <div id="webcam-container"></div>
    <div id="label-container">กดปุ่ม Start เพื่อเริ่มการทำงาน...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/F9eRRW2Me/";

    let model, webcam, labelContainer, maxPredictions;
    let lastPredictTime = 0; // เก็บเวลาที่ทำนายผลล่าสุด

    async function init() {
        // เปลี่ยนข้อความบนปุ่มเพื่อแจ้งสถานะกำลังโหลด
        const startBtn = document.getElementById("start-btn");
        startBtn.innerText = "Loading...";
        startBtn.disabled = true;

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true; 
        webcam = new tmImage.Webcam(200, 200, flip); 
        await webcam.setup(); 
        await webcam.play();
        
        // ล้างข้อความเริ่มต้นใน Container
        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";
        
        for (let i = 0; i < maxPredictions; i++) { 
            const row = document.createElement("div");
            row.className = "label-row";
            labelContainer.appendChild(row);
        }

        // ซ่อนปุ่มหลังจากเริ่มทำงานแล้ว
        startBtn.style.display = "none";
        
        window.requestAnimationFrame(loop);
    }

    async function loop(timestamp) {
        webcam.update(); // อัปเดตภาพหน้ากล้องตลอดเวลาเพื่อให้ภาพไหลลื่น (Real-time)
        
        // ตรวจสอบว่าเวลาผ่านไปครบ 3000 มิลลิวินาที (3 วินาที) หรือยัง
        if (!lastPredictTime || timestamp - lastPredictTime >= 3000) {
            lastPredictTime = timestamp; // บันทึกเวลาปัจจุบันไว้
            await predict(); // เรียกฟังก์ชันทำนายผล
        }
        
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            // แสดงผลชื่อคลาส และปรับทศนิยมความน่าจะเป็นให้สวยงาม
            const percent = (prediction[i].probability * 100).toFixed(0);
            const classPrediction = `<span>${prediction[i].className}</span> <strong>${percent}%</strong>`;
            labelContainer.childNodes[i].innerHTML = classPrediction;
        }
    }
</script>

</body>
</html>
